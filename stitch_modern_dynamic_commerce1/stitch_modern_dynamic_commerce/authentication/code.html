<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KINETIC | Authentication</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "inverse-primary": "#6d88ff",
                    "tertiary-fixed-dim": "#e883d2",
                    "secondary-container": "#e5e2e1",
                    "on-secondary": "#f5f2f1",
                    "secondary-dim": "#504f4f",
                    "tertiary-dim": "#832c76",
                    "on-secondary-container": "#525151",
                    "surface": "#f5f6f7",
                    "primary": "#0846ed",
                    "surface-container-low": "#eff1f2",
                    "secondary": "#5c5b5b",
                    "on-error": "#ffefef",
                    "background": "#f5f6f7",
                    "on-error-container": "#510017",
                    "inverse-surface": "#0c0f10",
                    "tertiary": "#913983",

                    "on-surface-variant": "#595c5d",
                    "error-container": "#f74b6d",

                    "error": "#b41340",

            "borderRadius": {
                    "DEFAULT": "0.125rem",

                    "body": ["Manrope"],
                    "label": ["Manrope"]

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .form-input-focus:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(8, 70, 237, 0.1);
            border-bottom: 2px solid #0846ed;
        }
    </style>
</head>
<body class="bg-background font-body text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- Navigation Suppressed for Transactional View -->
<main class="min-h-screen flex flex-col md:flex-row overflow-hidden">
<!-- Left Side: Editorial Content & Branding -->
<section class="hidden md:flex md:w-7/12 relative overflow-hidden bg-surface-container-low p-16 flex-col justify-between">
<!-- Branding -->
<div class="z-10">
<span class="text-2xl font-black tracking-tighter text-on-background font-headline">KINETIC</span>
</div>
<!-- Hero Message -->
<div class="z-10 max-w-xl">
<p class="font-label text-xs uppercase tracking-widest text-primary mb-4">The Kinetic Gallery</p>
<h1 class="font-headline text-5xl lg:text-7xl font-bold tracking-tight text-on-background leading-tight mb-8">
                    Elevate Your <br/>Motion.
                </h1>
<div class="flex gap-4">
<div class="w-12 h-1 bg-primary"></div>
<p class="text-on-surface-variant font-medium text-lg leading-relaxed">
                        Access an exclusive archive of curated editorial design and performance gear. Join the global flagship experience.
                    </p>
</div>
</div>
<!-- Footer Quote -->
<div class="z-10">
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-outline">Established 2024 © Kinetic Collective</p>
</div>
<!-- Background Image with Glass Overlay -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-90 scale-105" data-alt="high-fashion editorial photography of a model in motion wearing futuristic electric blue sneakers against a minimal architectural backdrop with sharp shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAb_5dbHT88FG_5sKiuiXv-HcgSsULwvbo1v0-EDY5AI5s_qVbCg6Q3mXHLY8DN8-En_ZRJstgK4F-HjGf5_pr1RA4lFXf6fUAde0OeglWDP-1oWegrKeqPCfw5PS6qcSuJRsYLvAhTXk0f_t0k8oa-bE6P8Fxi68v1UKkfP4ztG0134F9bwtJcbfA4WWanN-nig7DZmKc3HnSWQZ8JaJtAMLm-gCT8GzjzaCBNp8zsh3nohu0dqhpQTpz3G7Fe6FV_KtuyO8H3QlM"/>
<div class="absolute inset-0 bg-gradient-to-tr from-surface-container-low via-transparent to-transparent"></div>
</div>
</section>
<!-- Right Side: Minimalist Forms -->
<section class="flex-1 bg-surface-container-lowest flex flex-col justify-center px-8 md:px-20 lg:px-32 py-20 relative">
<div class="max-w-md w-full mx-auto">
<!-- Mobile Branding -->
<div class="md:hidden mb-12">
<span class="text-xl font-black tracking-tighter text-on-background font-headline">KINETIC</span>
</div>
<!-- Form Header -->
<div class="mb-10">
<h2 class="font-headline text-3xl font-bold text-on-background tracking-tight mb-2">Welcome Back</h2>
<p class="text-on-surface-variant">Sign in to your account or <button class="text-primary font-bold hover:underline underline-offset-4">create a new one</button></p>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4 mb-10">
<button class="flex items-center justify-center gap-2 py-4 px-4 rounded-full bg-surface-container-low text-on-surface font-label text-xs uppercase font-bold tracking-wider hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-lg" data-icon="google">google</span>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 py-4 px-4 rounded-full bg-surface-container-low text-on-surface font-label text-xs uppercase font-bold tracking-wider hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-lg" data-icon="apple">ios</span>
                        Apple
                    </button>
</div>
<!-- Divider -->
<div class="relative mb-10 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full h-[1px] bg-surface-container"></div>
</div>
<span class="relative bg-surface-container-lowest px-4 text-[10px] uppercase tracking-widest text-outline font-bold">Or use email</span>
</div>
<!-- Auth Form -->
<form action="#" class="space-y-8" method="POST">
<!-- Email Field -->
<div class="group">
<label class="block font-label text-[10px] uppercase font-black tracking-widest text-outline group-focus-within:text-primary transition-colors mb-2" for="email">Email Address</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-on-surface font-body placeholder:text-outline-variant/50 focus:ring-4 focus:ring-primary/10 transition-all" id="email" name="email" placeholder="name@gallery.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="group">
<div class="flex justify-between items-end mb-2">
<label class="block font-label text-[10px] uppercase font-black tracking-widest text-outline group-focus-within:text-primary transition-colors" for="password">Password</label>
<a class="font-label text-[10px] uppercase font-black tracking-widest text-primary hover:underline underline-offset-2" href="#">Forgot?</a>
</div>
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-on-surface font-body placeholder:text-outline-variant/50 focus:ring-4 focus:ring-primary/10 transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<input class="w-5 h-5 rounded-lg border-outline-variant/20 text-primary focus:ring-primary" id="remember" name="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant font-medium" for="remember">Remember this device</label>
</div>
<!-- Submit CTA -->
<button class="w-full py-5 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg shadow-[0_20px_40px_rgba(8,70,237,0.2)] hover:shadow-[0_25px_50px_rgba(8,70,237,0.3)] hover:-translate-y-1 active:translate-y-0 transition-all duration-300" type="submit">
                        Sign In
                    </button>
</form>
<!-- Footer Links -->
<div class="mt-12 pt-8 border-t border-surface-container-low flex flex-col sm:flex-row gap-6 justify-between items-center text-center sm:text-left">
<p class="text-[11px] text-outline uppercase tracking-widest font-bold">New to Kinetic?</p>
<button class="font-label text-xs uppercase font-black tracking-widest text-on-surface hover:text-primary transition-colors">Create Account</button>
</div>
</div>
<!-- Floating Support -->
<div class="absolute bottom-8 right-8">
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface hover:bg-on-surface hover:text-surface transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</section>
</main>
<!-- Modal Background Hint (Visual Interest) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] opacity-40">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] bg-primary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-tertiary-container/10 rounded-full blur-[100px]"></div>
</div>
</body></html>
